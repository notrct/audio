<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#020617,#0f172a,#1e293b);
  font-family:sans-serif;
  color:white;
}

#box{
  width:320px;
  text-align:center;
}

h2{
  margin-bottom:20px;
  font-weight:500;
}

.bar{
  height:18px;
  background:#334155;
  border-radius:50px;
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  border-radius:50px;
  background:linear-gradient(90deg,#22c55e,#4ade80,#16a34a);
  transition:width 0.05s linear;
}
</style>
</head>
<body>

<div id="box">
  <h2 id="status">Loading...</h2>
  <div class="bar">
    <div class="progress" id="progress"></div>
  </div>
</div>

<script src="App.js"></script>
</body>
</html>
